<section class="hero">
  <div class="hero-content">
    <h1>Snip</h1>
    <p class="tagline">Paste a long URL. Get a short one.</p>

    <form class="input-card" (ngSubmit)="submit()">
      <input
        type="text"
        placeholder="Paste any http:// or https:// URL…"
        [(ngModel)]="inputUrl"
        name="url"
        [disabled]="submitting()"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-send" type="submit" [disabled]="submitting()" aria-label="Shorten">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </form>
  </div>
</section>

<div class="content">
  @if (error()) {
    <div class="notice error" role="alert">{{ error() }}</div>
  }

  @if (result(); as link) {
    <div class="notice success">
      Your short link:&nbsp;
      <a [href]="link.shortUrl" target="_blank" rel="noopener">{{ link.shortUrl }}</a>
    </div>
  }

  @if (links().length > 0) {
    <div class="links-card">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Original URL</th>
            <th class="hits">Hits</th>
          </tr>
        </thead>
        <tbody>
          @for (link of links(); track link.code) {
            <tr>
              <td>
                <a class="code-link" [href]="link.shortUrl" target="_blank" rel="noopener">
                  {{ link.code }}
                </a>
              </td>
              <td class="url-cell" [title]="link.url">{{ link.url }}</td>
              <td class="hits">{{ link.hits }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
