name: Build and push image

# Fires when:
#   - "bundle" changes on main — this is the SUBMODULE POINTER FILE, so it
#     triggers exactly once per new bundle release pinned by build-bundle.mjs.
#   - This workflow file itself is modified (convenient for testing changes).
#   - Manually via workflow_dispatch.

on:
  push:
    branches: [main]
    paths:
      - bundle
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive   # bundle/ must be populated for the Docker build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./bundle
          file: ./bundle/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
